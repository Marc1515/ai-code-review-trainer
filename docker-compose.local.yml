services:
  app:
    container_name: ai-code-review-trainer-local-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:${APP_PORT:-3000}
      DATABASE_URL: postgresql://app:app@postgres:5432/ai_code_review_trainer?schema=public
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-90000}
      AUTH_SECRET: ${AUTH_SECRET:-local-development-secret-change-me}
      AUTH_URL: http://localhost:${APP_PORT:-3000}
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: local
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ai-code-review-trainer-local-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ai_code_review_trainer
    volumes:
      - ai-code-review-trainer-local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ai_code_review_trainer"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-code-review-trainer-local-ollama
    volumes:
      - ai-code-review-trainer-local-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 30
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-code-review-trainer-local-ollama-init
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until ollama list >/dev/null 2>&1; do
          echo "Waiting for Ollama..."
          sleep 2
        done
        ollama pull "${OLLAMA_MODEL:-qwen2.5-coder:3b}"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  ai-code-review-trainer-local-postgres-data:
  ai-code-review-trainer-local-ollama-data:
